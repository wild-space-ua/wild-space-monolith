  - 0,0,0,0

# Items that are too large to place inside of any kind of container.
- type: itemSize
  id: Huge
  weight: 1
  name: item-component-size-Huge
  defaultShape:
  - 0,0,0,0

# too big
- type: itemSize
  id: Ginormous
  weight: 1
  name: item-component-size-Ginormous
  defaultShape:
  - 0,0,0,0
