  categories: [ HideSpawnMenu ]
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _NF/Clothing/Head/Hardsuits/scaf.rsi
  - type: Clothing
    sprite: _NF/Clothing/Head/Hardsuits/scaf.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.8
  - type: PointLight
    radius: 8 # 7->8 Mono
    energy: 3 # 2->3 Mono
    color: "#FF0040" # mono
