# Station one w/ infinite ammo

- type: entity
  id: WeaponTurretThanatos
  name: THANATOS twin mass driver
  parent: BallisticArtilleryUnanchorable
  suffix: STATION ONLY, Recharging Ammo
  description: The charon's mean older brother, the Thanatos is a force to be reckoned with. It can be remotely activated or linked up to a GCS. This one feeds from an autoloader somewhere, and doesn't need manual reloads.
  components:
  - type: StaticPrice
    price: 65 # 1 april
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/thanatos.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
  - type: Battery
    maxCharge: 6500 # 1 april
    startingCharge: 6500 # 1 april
  - type: ExaminableBattery
  - type: WirelessNetworkConnection
    range: 500
  - type: GunSignalControl #I'm not certain why a station only gun has it in the description.
  - type: Gun
    fireRate: 2
    recoil: 6500 # Mono 1s april :godo:
    minAngle: 0
    maxAngle: 0
    # burstCooldown: 20
    # burstFireRate: 2
    # shotsPerBurst: 2
    projectileSpeed: 1100
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/leviathan_fire.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 65
  - type: SpaceArtillery
    powerChargeRate: 65
    powerUsePassive: 65
    powerUseActive: 65
  - type: Actions
  - type: ProjectileBatteryAmmoProvider
    proto: ShipRailgunProjectile
    fireCost: 650 # 1april
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 1500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1 # haha 1st april (paper gun LOL)
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadarBlip
    radarColor: "#CF0E0E"
    scale: 3
    visibleFromOtherGrids: true
    gridConfig:
      color: "#CF0E0E"
      shape: Square
      respectZoom: true
      rotate: true
      bounds: "-3,-3,3,3"
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Superheavy
  - type: ShipRepairable
    repairTime: 65 # :godo: 
    repairCost: 301 # haha 1st april


# If someone wants to make a ship version go nuts, but be SURE it uses ammo
