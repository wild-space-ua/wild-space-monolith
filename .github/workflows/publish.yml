name: Publish

on:
  workflow_dispatch:
  # Frontier: re-enabled autopublish bawk

concurrency:
  group: publish

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
    - name: Install dependencies
      run: sudo apt-get install -y python3-paramiko python3-lxml

    - uses: actions/checkout@v3.6.0
      with:
        submodules: 'recursive'
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3.2.0
      with:
        dotnet-version: 10.0.x

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform linux-x64

    - name: Generate Watchdog Manifest
      run: |
        SHA256_HASH=$(sha256sum release/SS14.Server_linux-x64.zip | cut -d ' ' -f 1)
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        cat > release/manifest.json <<EOF
        {
          "builds": {
            "1.0.0": {
              "time": "$BUILD_TIME",
              "client": {
                "url": "https://github.com/${{ github.repository }}/releases/download/latest/SS14.Server_linux-x64.zip",
                "sha256": "$SHA256_HASH"
              },
              "server": {
                "linux-x64": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/latest/SS14.Server_linux-x64.zip",
                  "sha256": "$SHA256_HASH"
                }
              }
            }
          }
        }
        EOF

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        files: |
          release/SS14.Server_linux-x64.zip
          release/manifest.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish changelog (Discord)
      run: Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}

    #- name: Publish changelog (RSS)
    #  run: Tools/actions_changelog_rss.py
    #  env:
    #    CHANGELOG_RSS_KEY: ${{ secrets.CHANGELOG_RSS_KEY }}
